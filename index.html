<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23caff00'/%3E%3Cg stroke='%230b0c0f' stroke-width='8' stroke-linecap='round'%3E%3Cpath d='M30 30l40 40'/%3E%3Cpath d='M22 22l16 16M62 62l16 16'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23caff00'/%3E%3Cg stroke='%230b0c0f' stroke-width='13' stroke-linecap='round'%3E%3Cpath d='M58 58l64 64'/%3E%3Cpath d='M42 42l28 28M110 110l28 28'/%3E%3C/g%3E%3C/svg%3E">
<title>Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0c0f; --bg-grad:radial-gradient(120% 80% at 50% -10%,#16181f 0%,#0b0c0f 60%);
    --surface:#15171d; --surface2:#1d2027; --line:#2a2e38;
    --txt:#f3f5f8; --muted:#878f9e;
    --volt:#caff00; --coral:#ff5a36; --blue:#3da5ff; --pink:#ff4d8d; --amber:#ffb020; --green:#39d98a;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Rajdhani',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--txt);line-height:1.4;padding-bottom:84px;font-size:16px;font-weight:500}
  .display{font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:1px;font-weight:400}
  .wrap{max-width:580px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 15px 0}
  .ic{display:inline-flex;align-items:center}
  .ic svg{width:18px;height:18px}
  .logo svg{width:22px;height:22px}
  h2.sec .ic svg{width:20px;height:20px}
  .badge svg{width:13px;height:13px}
  #nameEdit svg{width:15px;height:15px}
  header.app{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 14px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:38px;height:38px;display:grid;place-items:center;background:var(--volt);border-radius:11px;color:#0b0c0f;transform:rotate(-6deg)}
  .brand h1{font-family:'Bebas Neue',sans-serif;font-size:26px;margin:0;letter-spacing:2px;line-height:1}
  .brand .sub{font-size:12px;color:var(--muted);letter-spacing:.3px;text-transform:none;margin-top:2px}
  .lang{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .lang button{background:transparent;color:var(--muted);border:none;padding:7px 11px;font-family:'Rajdhani';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer}
  .lang button.on{background:var(--volt);color:#0b0c0f}
  h2.sec{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;margin:22px 2px 11px;display:flex;align-items:center;gap:8px}
  h2.sec .ic{color:var(--volt)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .card.tight{padding:13px}
  .row{display:flex;gap:10px}.row.between{justify-content:space-between;align-items:center}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 10px;text-align:center;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--volt)}
  .stat .num{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--volt)}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .muted{color:var(--muted)}.small{font-size:14px}.xs{font-size:12px}
  button{font-family:'Rajdhani',sans-serif;cursor:pointer;border:none;border-radius:13px;font-size:16px;font-weight:600}
  .btn{background:var(--volt);color:#0b0c0f;font-weight:700;padding:14px 16px;width:100%;border-radius:14px;text-transform:uppercase;letter-spacing:1px;transition:.12s;display:flex;align-items:center;justify-content:center;gap:9px}
  .btn:active{transform:scale(.98)}
  .btn.sec{background:var(--surface2);color:var(--txt);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);text-transform:none;letter-spacing:.5px}
  .btn.danger{background:transparent;color:var(--coral);border:1px solid #4a2a23;text-transform:none}
  .btn.mini{width:auto;padding:9px 13px;font-size:13px}
  .btn .ic svg{width:18px;height:18px}
  input,select,textarea{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;background:#0e1014;color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:12px;width:100%;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--volt)}
  textarea{resize:vertical;min-height:66px}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 5px 3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--line);color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap}
  .pill.on{background:rgba(202,255,0,.16);border-color:var(--volt);color:var(--volt)}
  .pill.amber.on{background:rgba(255,176,32,.16);border-color:var(--amber);color:var(--amber)}
  .pill.red.on{background:rgba(255,90,54,.16);border-color:var(--coral);color:var(--coral)}
  .pill.blue.on{background:rgba(61,165,255,.16);border-color:var(--blue);color:var(--blue)}
  .pill.pink.on{background:rgba(255,77,141,.16);border-color:var(--pink);color:var(--pink)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
  .badge.up{background:rgba(202,255,0,.16);color:var(--volt)}
  .badge.hold{background:rgba(61,165,255,.16);color:var(--blue)}
  .badge.new{background:rgba(255,176,32,.16);color:var(--amber)}
  .ex{border-top:1px solid var(--line);padding:11px 0}
  .ex:first-of-type{border-top:none}
  .ex .name{font-weight:700;font-size:16px}
  .ex .meta{font-size:13px;color:var(--muted);margin-top:2px}
  .ex .howto{font-size:12.5px;color:var(--muted);margin-top:3px;font-style:italic}
  .secblock{margin-bottom:12px}
  .sechead{display:flex;align-items:center;gap:9px;margin:16px 2px 8px}
  .sechead .dot{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none}
  .sechead .dot svg{width:17px;height:17px}
  .sechead .t{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px}
  .sechead .c{font-size:11px;color:var(--muted);margin-left:auto;text-transform:uppercase;letter-spacing:.5px}
  .daytab{padding:10px 13px;border-radius:12px;font-size:13px;font-weight:700;background:var(--surface2);border:1px solid var(--line);color:var(--muted);white-space:nowrap;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
  .daytab.on{background:var(--volt);border-color:var(--volt);color:#0b0c0f}
  .scrollx{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .scrollx::-webkit-scrollbar{display:none}
  nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(11,12,15,.93);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  nav.tabs button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0 11px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  nav.tabs button.on{color:var(--volt)}
  nav.tabs svg{width:22px;height:22px}
  .view{display:none;animation:fade .22s}.view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .empty{color:var(--muted);text-align:center;padding:24px 12px;font-size:15px}
  .note{background:#0e1014;border:1px solid var(--line);border-left:3px solid var(--volt);border-radius:12px;padding:12px 13px;font-size:14px;color:var(--muted)}
  .hero{background:linear-gradient(120deg,#1a1d25,#121419);border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;margin-bottom:12px}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(202,255,0,.14),transparent 70%)}
  .hero .ic{color:var(--volt)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .modal-bg.on{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:580px;padding:20px 16px 28px;max-height:90vh;overflow:auto}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1.5px;margin:2px 0 14px}
  .tag-chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--surface2);color:var(--muted);margin:0 5px 5px 0;text-transform:uppercase;letter-spacing:.5px}
  .spark{width:100%;display:block}
  .libitem{display:flex;gap:12px;align-items:flex-start;border-top:1px solid var(--line);padding:12px 0}
  .libitem:first-child{border-top:none}
  .libitem .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}
  .libitem .ico svg{width:19px;height:19px}
  .libitem .nm{font-weight:700}
  .libitem .mu{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .libitem .ht{font-size:12.5px;color:var(--muted);font-style:italic;margin-top:2px}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .photo-grid img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
  .photo-cell{position:relative}
  .photo-cell .cap{position:absolute;left:6px;bottom:6px;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
  .cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cmp .lab{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:15px;color:var(--volt);margin-bottom:5px;text-align:center}
  .cmp img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
  .swatch-up{color:var(--volt)}.swatch-hold{color:var(--blue)}
  #restBar{display:none;position:fixed;left:0;right:0;bottom:calc(86px + env(safe-area-inset-bottom));z-index:60;justify-content:center;padding:0 12px}
  #restBar .inner{max-width:556px;width:100%;background:var(--volt);color:#0b0c0f;border-radius:14px;padding:10px 12px 10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.45)}
  #restBar .tm{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;line-height:1}
  #restBar .lb{font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:1px}
  #restBar button{background:rgba(0,0,0,.14);color:#0b0c0f;border-radius:9px;padding:8px 11px;font-weight:700;font-size:13px}
  #restBar button.k{background:#0b0c0f;color:var(--volt)}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{flex:1;min-width:54px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px 4px;font-weight:700;font-size:13px}
  .seg button.on{background:var(--volt);border-color:var(--volt);color:#0b0c0f}
  .ring-wrap{display:flex;align-items:center;gap:14px}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal .wd{font-size:9px;color:var(--muted);text-align:center;text-transform:uppercase;font-weight:700;padding-bottom:2px}
  .cal .cell{aspect-ratio:1;display:grid;place-items:center;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);background:#0e1014}
  .cal .cell.out{opacity:0}
  .cal .cell.train{background:var(--volt);color:#0b0c0f}
  .cal .cell.period{background:rgba(255,77,141,.28);color:var(--pink)}
  .cal .cell.pred{border:1px dashed var(--pink);color:var(--pink);background:transparent}
  .cal .cell.today{outline:2px solid var(--blue);outline-offset:-2px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px}
  .legend span{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .legend i{width:12px;height:12px;border-radius:4px;display:inline-block}
  .rate{display:flex;gap:6px}
  .rate button{flex:1;background:var(--surface2);border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:8px 0;font-weight:700}
  .rate button.on{background:var(--volt);border-color:var(--volt);color:#0b0c0f}
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .medal{text-align:center;opacity:.5;cursor:pointer}
  .medal.on{opacity:1}
  .mic{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;margin:0 auto}
  .mic svg{width:26px;height:26px}
  .mn{font-size:12px;font-weight:700;margin-top:6px;line-height:1.15}
  .mp{font-size:11px;color:var(--muted)}
  .mach{font-size:12.5px;color:var(--blue);margin-top:4px;display:flex;align-items:center;gap:5px}
  .mach svg{width:14px;height:14px;flex:none}
  .dgbox{background:#0e1014;border:1px solid var(--line);border-radius:12px;padding:6px}
  .dgbox svg{width:100%;height:auto;display:block}
  .hub{position:relative;width:100%;max-width:360px;aspect-ratio:1;margin:14px auto 0}
  .bub{position:absolute;aspect-ratio:1;border-radius:50%;display:grid;place-items:center;text-align:center;cursor:pointer;transition:.12s;background:var(--surface);border:1px solid var(--line)}
  .bub:active{transform:scale(.93)}
  .bub .bi{display:grid;place-items:center}
  .bub .bi svg{width:26px;height:26px;color:var(--volt)}
  .bub .bl{font-size:12px;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.4px;color:var(--txt);padding:0 6px;line-height:1.1}
  .bub.small{width:27%}
  .bub.center{width:39%;left:30.5%;top:30.5%;background:var(--volt);border-color:var(--volt);box-shadow:0 0 0 7px rgba(202,255,0,.12)}
  .bub.center .bi svg{width:40px;height:40px;color:#0b0c0f}
  .bub.center .bl{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1.5px;color:#0b0c0f;margin-top:2px}
  .hubhint{text-align:center;color:var(--muted);font-size:13px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="brand" onclick="editName()" style="cursor:pointer">
      <div class="logo" id="logoIcon"></div>
      <div><div style="display:flex;align-items:center;gap:6px"><h1 id="brandName">FORJA</h1><span class="ic" id="nameEdit" style="opacity:.45"></span></div>
      <div class="sub" id="brandSub">Training</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="lang"><button id="langEs" onclick="setLang('es')">ES</button><button id="langDe" onclick="setLang('de')">DE</button></div>
      <button class="btn mini sec" style="padding:9px 11px" onclick="openMenu()"><span class="ic" id="gearIc"></span></button>
    </div>
  </header>

  <!-- HUB (INICIO) -->
  <section class="view on" id="v-inicio">
    <div class="hub">
      <div class="bub small" style="left:36.5%;top:1.2%" onclick="go('rutina')"><div><div class="bi" id="bubRut"></div><div class="bl" data-i18n="nav_routine"></div></div></div>
      <div class="bub small" style="left:70%;top:25.6%" onclick="go('ejercicios')"><div><div class="bi" id="bubEje"></div><div class="bl" data-i18n="nav_library"></div></div></div>
      <div class="bub small" style="left:57.1%;top:65%" onclick="go('progreso')"><div><div class="bi" id="bubPro"></div><div class="bl" data-i18n="nav_progress"></div></div></div>
      <div class="bub small" style="left:15.6%;top:65%" onclick="go('diario')"><div><div class="bi" id="bubDia"></div><div class="bl" data-i18n="nav_journal"></div></div></div>
      <div class="bub small" style="left:3%;top:25.6%" onclick="go('resumen')"><div><div class="bi" id="bubRes"></div><div class="bl" data-i18n="nav_resumen"></div></div></div>
      <div class="bub center" onclick="go('entrenar')"><div><div class="bi" id="bubEnt"></div><div class="bl" data-i18n="nav_train"></div></div></div>
    </div>
    <div class="hubhint" data-i18n="hub_hint"></div>
  </section>

  <!-- RESUMEN -->
  <section class="view" id="v-resumen">
    <div class="grid3">
      <div class="stat"><div class="num" id="stWeek">0</div><div class="lbl" data-i18n="st_week"></div></div>
      <div class="stat"><div class="num" id="stStreak">0</div><div class="lbl" data-i18n="st_streak"></div></div>
      <div class="stat"><div class="num" id="stTotal">0</div><div class="lbl" data-i18n="st_total"></div></div>
    </div>
    <div class="card"><div class="small" id="motiv"></div></div>
    <div id="streakBody"></div>
    <h2 class="sec"><span class="ic" id="icMedal"></span><span data-i18n="medals_title"></span></h2>
    <div id="medalsBody"></div>
    <h2 class="sec"><span class="ic" id="icWeek"></span><span data-i18n="week_summary"></span></h2>
    <div id="weekSummary"></div>
    <h2 class="sec"><span class="ic" id="icCal"></span><span data-i18n="consistency"></span></h2>
    <div class="card" id="consistencyCal"></div>
    <h2 class="sec"><span class="ic" id="icToday"></span><span data-i18n="today"></span></h2>
    <div class="card"><div class="row between"><div><div class="muted xs" data-i18n="suggested_day"></div><div class="display" style="font-size:22px" id="suggestDay">—</div></div>
      <button class="btn mini" onclick="startSuggested()"><span class="ic" id="icPlay"></span><span data-i18n="btn_train"></span></button></div></div>
    <div class="grid2">
      <button class="btn sec" onclick="go('progreso');setTimeout(()=>document.getElementById('wKg').focus(),200)"><span class="ic" id="icScale"></span><span data-i18n="btn_log_weight"></span></button>
      <button class="btn sec" onclick="openJournal()"><span class="ic" id="icPen"></span><span data-i18n="btn_quick_note"></span></button>
    </div>
    <h2 class="sec"><span class="ic" id="icBook2"></span><span data-i18n="recent_notes"></span></h2>
    <div id="recentNotes"></div>
  </section>

  <!-- RUTINA -->
  <section class="view" id="v-rutina">
    <div class="note" style="margin-bottom:12px"><b style="color:var(--txt)" data-i18n="phase_label"></b>: <span id="phaseText"></span></div>
    <div class="scrollx" id="dayTabs" style="margin-bottom:6px"></div>
    <div id="routineBody"></div>
    <button class="btn" style="margin-top:6px" onclick="go('ejercicios')"><span class="ic" id="icPlusLib"></span><span data-i18n="add_from_lib"></span></button>
    <button class="btn ghost" style="margin-top:10px" onclick="editDayName()" data-i18n="rename_day"></button>
    <button class="btn danger" style="margin-top:14px" onclick="resetRoutine()" data-i18n="reset_routine"></button>
  </section>

  <!-- ENTRENAR -->
  <section class="view" id="v-entrenar">
    <div class="card tight"><label class="fld" data-i18n="which_day"></label><select id="trainDaySel" onchange="renderTrain()"></select></div>
    <div id="trainBody"></div>
    <button class="btn" id="saveTrainBtn" style="margin-top:6px;display:none" onclick="saveWorkout()"><span class="ic" id="icCheck"></span><span data-i18n="save_workout"></span></button>
  </section>

  <!-- EJERCICIOS (LIBRERÍA) -->
  <section class="view" id="v-ejercicios">
    <div class="note" style="margin-bottom:10px" data-i18n="lib_hint"></div>

/* ===== UTILS ===== */
function uid(){ return Math.random().toString(36).slice(2,9); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString(DB.lang==='de'?'de-DE':'es-AR',{weekday:"short",day:"numeric",month:"short"}); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function startOfWeek(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return d; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function dn(o){ return (DB.lang==='de'&&o.nameDe)?o.nameDe:o.name; }
function dinstr(o){ return (DB.lang==='de'&&o.instrDe)?o.instrDe:(o.instr||""); }
function timeWord(n){ return n===1?t('time_once'):t('time_many'); }
function metaFor(it){
 if(it.scheme) return esc(it.scheme);
 if(it.kind==='cardio') return `${it.rMin}-${it.rMax} min`;
 if(it.kind==='hold') return `${it.sets} × ${it.rMin}-${it.rMax} ${t('secs')} · ${it.rest}${t('secs')} ${t('rest')}`;
 if(it.kind==='move') return it.rMin? `${it.rMin}-${it.rMax} ${t('secs')}` : t('cat_warmup');
 if(it.kind==='reps') return `${it.sets} × ${it.rMin}-${it.rMax} ${t('reps')} · ${it.rest}${t('secs')} ${t('rest')}`;
 return `${it.sets} × ${it.rMin}-${it.rMax} ${t('reps')} · ${it.rest}${t('secs')} ${t('rest')}`; // weight
}

/* ===== FASE / PROGRESIÓN ===== */
function weeksSinceStart(){ return Math.floor(daysBetween(DB.startDate,today())/7); }
function phaseInfo(){ const w=weeksSinceStart(); if(w<3)return{n:1,text:t('phase1')}; if(w<8)return{n:2,text:t('phase2')}; return{n:3,text:t('phase3')}; }
function lastForExercise(name){ for(let i=DB.logs.length-1;i>=0;i--){ const f=DB.logs[i].exercises.find(x=>x.name===name); if(f&&f.weight>0)return f; } return null; }
function suggestion(it){ const last=lastForExercise(it.name); if(!last)return{type:"new",txt:t('sug_new'),pref:""}; if(last.top&&last.reps>=it.rMax)return{type:"up",txt:t('sug_up',{r:last.reps,w:last.weight}),pref:last.weight}; return{type:"hold",txt:t('sug_hold',{w:last.weight,r:last.reps}),pref:last.weight}; }

function streak(){ if(!DB.logs.length)return 0; const sow=new Date();sow.setDate(sow.getDate()-6); return [...new Set(DB.logs.map(l=>l.date))].filter(d=>new Date(d+"T00:00:00")>=sow).length; }
function nextDayIdx(){ if(!DB.logs.length)return 0; const last=DB.logs[DB.logs.length-1].dayName; const idx=DB.routine.findIndex(d=>d.name===last||d.nameDe===last); return idx<0?0:(idx+1)%DB.routine.length; }

 let d="",c=""; pts.forEach((p,i)=>{const x=px(+new Date(p.date)),y=py(p.val); d+=(i?" L":"M")+x.toFixed(1)+" "+y.toFixed(1); c+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="#3da5ff"/>`;});

 const en=DB.journal.filter(j=>j.energy&&new Date(j.date+"T00:00:00")>=sow).map(j=>j.energy); const avgEn=en.length?(en.reduce((a,b)=>a+b,0)/en.length).toFixed(1):"—";

function calMonth(y,m,markFn){
 const wd=DB.lang==='de'?['M','D','M','D','F','S','S']:['L','M','M','J','V','S','D'];
 const off=(new Date(y,m,1).getDay()+6)%7, dim=new Date(y,m+1,0).getDate();
 let cells=wd.map(d=>`<div class="wd">${d}</div>`).join("");
 for(let i=0;i<off;i++)cells+=`<div class="cell out"></div>`;
 for(let d=1;d<=dim;d++){ const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; cells+=`<div class="cell${markFn(iso)}">${d}</div>`; }
 return `<div class="cal">${cells}</div>`;
}

/* ===== CICLO MENSTRUAL ===== */
function addDays(iso,n){ const d=new Date(iso+"T00:00:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function cycleAvg(){ const s=[...(DB.cycle||[])].sort(); if(s.length>=2){ let sum=0,c=0; for(let i=1;i<s.length;i++){ const d=daysBetween(s[i-1],s[i]); if(d>=18&&d<=40){sum+=d;c++;} } if(c)return Math.round(sum/c); } return (DB.settings&&DB.settings.cycleLen)||28; }
function cycleInfo(){ if(!DB.cycle||!DB.cycle.length)return null; const s=[...DB.cycle].sort(); let last=s[0]; for(const x of s){ if(x<=today())last=x; } const avg=cycleAvg(); const day=daysBetween(last,today())+1; let next=last; while(next<=today())next=addDays(next,avg); const nextDays=daysBetween(today(),next); const ov=Math.max(10,avg-14); let phaseKey,tip; if(day<=5){phaseKey='phase_menstrual';tip='tip_menstrual';}else if(day<ov){phaseKey='phase_follicular';tip='tip_follicular';}else if(day<=ov+2){phaseKey='phase_ovulation';tip='tip_ovulation';}else{phaseKey='phase_luteal';tip='tip_luteal';} return {day,avg,last,next,nextDays,phaseKey,tip}; }
function markPeriod(){ const d=today(); if(!DB.cycle.includes(d))DB.cycle.push(d); DB.cycle.sort(); save(); renderProgreso(); }
function delCycle(s){ if(confirm(t('confirm_del_cycle'))){ DB.cycle=DB.cycle.filter(x=>x!==s); save(); renderProgreso(); } }
function renderCycle(){
 const body=document.getElementById('cycleBody'), list=document.getElementById('cycleList');
 if(!DB.cycle||!DB.cycle.length){ body.innerHTML=`<div class="note" style="margin-bottom:12px">${t('no_cycle')}</div>`; list.innerHTML=""; return; }
 const info=cycleInfo(), starts=[...DB.cycle].sort(), now=new Date();
 const periodDays=new Set(); starts.forEach(s=>{ for(let k=0;k<5;k++)periodDays.add(addDays(s,k)); });
 const predDays=new Set(); let p=info.last; for(let i=0;i<4;i++){ p=addDays(p,info.avg); for(let k=0;k<5;k++)predDays.add(addDays(p,k)); }
 const cal=calMonth(now.getFullYear(),now.getMonth(),iso=>{ let c=""; if(periodDays.has(iso))c+=" period"; else if(predDays.has(iso))c+=" pred"; if(iso===today())c+=" today"; return c; });
 body.innerHTML=`<div class="card"><div class="display" style="font-size:20px;color:var(--pink)">${t(info.phaseKey)}</div><div class="small muted" style="margin:2px 0 8px">${t('cycle_day',{n:info.day})} · ${info.nextDays<=0?t('period_today'):t('next_period',{n:info.nextDays})}</div><div class="note" style="border-left-color:var(--pink)">${t(info.tip)}</div></div>
  <div class="card">${cal}<div class="legend"><span><i style="background:rgba(255,77,141,.5)"></i>${t('lg_period')}</span><span><i style="border:1px dashed var(--pink)"></i>${t('lg_pred')}</span><span><i style="outline:2px solid var(--blue);outline-offset:-2px"></i>${t('lg_today')}</span></div></div>`;
 list.innerHTML=`<div class="xs muted" style="margin:0 2px 6px;text-transform:uppercase;letter-spacing:.5px">${t('recent_starts')}</div>`+[...starts].reverse().slice(0,8).map(s=>`<div class="card tight"><div class="row between"><span class="small" style="display:flex;align-items:center;gap:6px">${ICONS.drop} ${fmtDate(s)}</span><button class="btn mini ghost" onclick="delCycle('${s}')">${ICONS.trash}</button></div></div>`).join("");
}

/* ===== GRÁFICO DE FUERZA POR EJERCICIO ===== */
function openExerciseChart(enc){ const name=decodeURIComponent(enc); const e=EXERCISES.find(x=>x.name===name)||{name,nameDe:""}; const pts=[]; DB.logs.forEach(l=>l.exercises.forEach(x=>{ if(x.name===name&&x.kind==='weight'&&x.weight>0)pts.push({date:l.date,val:x.weight}); }));
 const inner=pts.length<2?`<div class="empty">${t('no_history')}</div>`:`<svg class="spark" id="exSpark" viewBox="0 0 320 150" preserveAspectRatio="none" style="height:150px"></svg>`;
 showModal(`<h3>${t('progress_of')}<br>${esc(dn(e))}</h3>${inner}<button class="btn ghost" style="margin-top:12px" onclick="closeModal()">${t('close')}</button>`);
 if(pts.length>=2)setTimeout(()=>drawLine('exSpark',pts,'kg'),30);
}

/* ===== RACHA, GEMAS Y CONGELADOR ===== */
const GEM_PER=10, WEEK_BONUS=25, PR_BONUS=15, FREEZE_COST=50;
function weekStart(d){ const x=new Date((d||today())+'T00:00:00'); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); return x.toISOString().slice(0,10); }
function prevWeek(ws){ const d=new Date(ws+'T00:00:00'); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); }
function weekCounts(){ const c={}; DB.logs.forEach(l=>{ const w=weekStart(l.date); c[w]=(c[w]||0)+1; }); return c; }
function computeStreak(){ const goal=(DB.settings&&DB.settings.weeklyGoal)||3, c=weekCounts(), froz=new Set(DB.frozenWeeks||[]), met=w=>((c[w]||0)>=goal)||froz.has(w), curW=weekStart(today()); let streak=0,cursor;
 if(met(curW)){ streak=1; cursor=prevWeek(curW); } else cursor=prevWeek(curW);
 while(met(cursor)){ streak++; cursor=prevWeek(cursor); }
 return {streak,goal,curW,curCount:c[curW]||0,curMet:met(curW)}; }
function firstLogWeek(){ if(!DB.logs.length)return null; let m=DB.logs[0].date; DB.logs.forEach(l=>{ if(l.date<m)m=l.date; }); return weekStart(m); }
function riskWeek(){ const goal=(DB.settings&&DB.settings.weeklyGoal)||3, c=weekCounts(), froz=new Set(DB.frozenWeeks||[]), met=w=>((c[w]||0)>=goal)||froz.has(w), pw=prevWeek(weekStart(today())), fw=firstLogWeek();
 if(fw && pw>=fw && !met(pw)) return pw; return null; }
function useFreeze(){ const pw=riskWeek(); if(!pw)return; if((DB.gems||0)<FREEZE_COST){ alert(t('not_enough_gems')); return; } if(!confirm(t('confirm_freeze',{c:FREEZE_COST})))return; DB.gems-=FREEZE_COST; DB.frozenWeeks=DB.frozenWeeks||[]; DB.frozenWeeks.push(pw); save(); renderStreak(); }
function renderStreak(){ const box=document.getElementById('streakBody'); if(!box)return; const s=computeStreak(), risk=riskWeek(), goal=s.goal, c=weekCounts(), froz=new Set(DB.frozenWeeks||[]);
 let w=weekStart(today()); const arr=[]; for(let i=0;i<6;i++){ arr.unshift(w); w=prevWeek(w); }
 const strip=arr.map(ws=>{ const cnt=c[ws]||0, isCur=ws===s.curW, ok=cnt>=goal, fr=froz.has(ws); const bg=fr?'var(--blue)':(ok?'var(--volt)':'#0e1014'); const col=(fr||ok)?'#0b0c0f':'var(--muted)'; const brd=isCur?'2px solid var(--volt)':'1px solid var(--line)'; return `<div style="flex:1;text-align:center"><div style="height:36px;border-radius:9px;display:grid;place-items:center;background:${bg};color:${col};font-weight:700;border:${brd}">${fr?'❄':cnt}</div></div>`; }).join("");
 box.innerHTML=`<div class="card" style="background:linear-gradient(120deg,#1a1d25,#121419)"><div class="row between"><div><div class="display" style="font-size:52px;line-height:.9;color:var(--volt);display:flex;align-items:center;gap:8px"><span class="ic" style="width:34px;height:34px">${ICONS.flame}</span>${s.streak}</div><div class="muted small" style="text-transform:uppercase;letter-spacing:1px;margin-top:2px">${t('streak_unit')}</div></div>
   <div style="text-align:right"><div class="display" style="font-size:28px;color:var(--blue);display:flex;align-items:center;gap:6px;justify-content:flex-end"><span class="ic" style="width:24px;height:24px">${ICONS.gem}</span>${DB.gems||0}</div><div class="muted xs">${t('gems')}</div></div></div>
   <div class="xs muted" style="margin-top:8px">${t('this_week')}: ${s.curCount}/${goal}${s.curMet?' · '+t('week_met'):''}</div>
   <div class="xs muted" style="margin:12px 0 5px;text-transform:uppercase;letter-spacing:.5px">${t('weeks_strip')}</div><div style="display:flex;gap:5px">${strip}</div>
   ${risk?`<div class="note" style="border-left-color:var(--coral);margin-top:12px">${t('streak_risk')}</div><button class="btn" style="margin-top:8px" onclick="useFreeze()"><span class="ic">${ICONS.gem}</span>${t('use_freeze')} · ${FREEZE_COST}</button>`:''}
   ${s.streak===0&&!risk?`<div class="note" style="margin-top:12px">${t('streak_zero')}</div>`:''}</div>`;
}

/* ===== MEDALLAS / LOGROS ===== */
const MEDALS=[
 {id:'first',icon:'flame',n:{es:'Primer paso',de:'Erster Schritt'},d:{es:'Completá tu primer entreno',de:'Absolviere dein erstes Workout'},g:1,v:s=>s.workouts},
 {id:'w10',icon:'dumbbell',n:{es:'En marcha',de:'In Fahrt'},d:{es:'10 entrenos',de:'10 Workouts'},g:10,v:s=>s.workouts},
 {id:'w25',icon:'dumbbell',n:{es:'Constante',de:'Beständig'},d:{es:'25 entrenos',de:'25 Workouts'},g:25,v:s=>s.workouts},
 {id:'w50',icon:'dumbbell',n:{es:'Imparable',de:'Unaufhaltsam'},d:{es:'50 entrenos',de:'50 Workouts'},g:50,v:s=>s.workouts},
 {id:'w100',icon:'trophy',n:{es:'Leyenda',de:'Legende'},d:{es:'100 entrenos',de:'100 Workouts'},g:100,v:s=>s.workouts},
 {id:'s4',icon:'flame',n:{es:'Un mes fuerte',de:'Starker Monat'},d:{es:'Racha de 4 semanas',de:'4 Wochen Serie'},g:4,v:s=>s.streak},
 {id:'s12',icon:'flame',n:{es:'Trimestre imbatible',de:'Top-Quartal'},d:{es:'Racha de 12 semanas',de:'12 Wochen Serie'},g:12,v:s=>s.streak},
 {id:'s26',icon:'flame',n:{es:'Medio año',de:'Halbes Jahr'},d:{es:'Racha de 26 semanas',de:'26 Wochen Serie'},g:26,v:s=>s.streak},
 {id:'gem200',icon:'gem',n:{es:'Coleccionista',de:'Sammlerin'},d:{es:'Juntá 200 gemas',de:'Sammle 200 Edelsteine'},g:200,v:s=>s.gems},
 {id:'gem1000',icon:'gem',n:{es:'Tesoro',de:'Schatz'},d:{es:'Juntá 1000 gemas',de:'Sammle 1000 Edelsteine'},g:1000,v:s=>s.gems},
 {id:'pr1',icon:'trophy',n:{es:'Más fuerte',de:'Stärker'},d:{es:'Tu primer récord de peso',de:'Dein erster Gewichtsrekord'},g:1,v:s=>s.prs},
 {id:'photo4',icon:'camera',n:{es:'Transformación',de:'Verwandlung'},d:{es:'4 fotos de progreso',de:'4 Fortschrittsfotos'},g:4,v:s=>s.photos}
];
function statsForMedals(){ return {workouts:DB.logs.length,streak:computeStreak().streak,gems:DB.gems||0,prs:DB.prCount||0,photos:(DB.photos||[]).length}; }
function earnedIds(){ const s=statsForMedals(); return MEDALS.filter(m=>m.v(s)>=m.g).map(m=>m.id); }
function checkNewMedals(){ const seen=new Set(DB.medalsSeen||[]); const now=earnedIds(); const fresh=now.filter(id=>!seen.has(id)); DB.medalsSeen=now; return fresh; }
function renderMedals(){ const box=document.getElementById('medalsBody'); if(!box)return; const s=statsForMedals();
 box.innerHTML=`<div class="card"><div class="mgrid">`+MEDALS.map(m=>{ const val=m.v(s), earned=val>=m.g, nm=DB.lang==='de'?m.n.de:m.n.es;
   return `<div class="medal ${earned?'on':''}" onclick="medalInfo('${m.id}')"><div class="mic" style="${earned?'background:var(--volt);color:#0b0c0f':'background:#0e1014;color:var(--muted)'}">${ICONS[m.icon]}</div><div class="mn">${esc(nm)}</div><div class="mp">${Math.min(val,m.g)}/${m.g}</div></div>`; }).join("")+`</div></div>`;
}
function medalInfo(id){ const m=MEDALS.find(x=>x.id===id); if(!m)return; const s=statsForMedals(), earned=m.v(s)>=m.g; showModal(`<h3 style="display:flex;align-items:center;gap:8px"><span class="ic">${ICONS[m.icon]}</span>${esc(DB.lang==='de'?m.n.de:m.n.es)}</h3><p class="small">${esc(DB.lang==='de'?m.d.de:m.d.es)}</p><p class="small" style="color:${earned?'var(--volt)':'var(--muted)'}">${earned?t('medal_earned'):t('locked')} · ${Math.min(m.v(s),m.g)}/${m.g}</p><button class="btn" onclick="closeModal()">${t('done')}</button>`); }

/* ===== INIT ===== */
if((DB.medalsSeen||[]).length===0 && DB.logs.length>0){ DB.medalsSeen=earnedIds(); save(); }
applyStatic();
go("inicio");
window.addEventListener('pagehide',saveDraft);
window.addEventListener('blur',saveDraft);
document.addEventListener('visibilitychange',function(){ if(document.hidden)saveDraft(); });
</script>
