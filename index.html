<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0c0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23caff00'/%3E%3Cg stroke='%230b0c0f' stroke-width='8' stroke-linecap='round'%3E%3Cpath d='M30 30l40 40'/%3E%3Cpath d='M22 22l16 16M62 62l16 16'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23caff00'/%3E%3Cg stroke='%230b0c0f' stroke-width='13' stroke-linecap='round'%3E%3Cpath d='M58 58l64 64'/%3E%3Cpath d='M42 42l28 28M110 110l28 28'/%3E%3C/g%3E%3C/svg%3E">
<title>Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0c0f; --bg-grad:radial-gradient(120% 80% at 50% -10%,#16181f 0%,#0b0c0f 60%);
    --surface:#15171d; --surface2:#1d2027; --line:#2a2e38;
    --txt:#f3f5f8; --muted:#878f9e;
    --volt:#caff00; --volt-d:#a6d400; --coral:#ff5a36; --blue:#3da5ff;
    --pink:#ff4d8d; --amber:#ffb020; --green:#39d98a;
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Rajdhani',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;
    color:var(--txt);line-height:1.4;padding-bottom:84px;font-size:16px;font-weight:500;
  }
  .display{font-family:'Bebas Neue',Impact,sans-serif;letter-spacing:1px;font-weight:400}
  .wrap{max-width:580px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top)) 15px 0}
  .ic{display:inline-flex;align-items:center}
  .ic svg{width:18px;height:18px}
  .logo svg{width:22px;height:22px}
  h2.sec .ic svg{width:20px;height:20px}
  .badge svg{width:13px;height:13px}
  #nameEdit svg{width:15px;height:15px}
  header.app{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 16px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:38px;height:38px;display:grid;place-items:center;background:var(--volt);border-radius:11px;color:#0b0c0f;transform:rotate(-6deg)}
  .brand h1{font-family:'Bebas Neue',sans-serif;font-size:27px;margin:0;letter-spacing:2px;line-height:1}
  .brand .sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
  .lang{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .lang button{background:transparent;color:var(--muted);border:none;padding:7px 11px;font-family:'Rajdhani';font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer}
  .lang button.on{background:var(--volt);color:#0b0c0f}
  h2.sec{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:var(--txt);margin:24px 2px 12px;display:flex;align-items:center;gap:8px}
  h2.sec .ic{color:var(--volt)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .card.tight{padding:13px}
  .row{display:flex;gap:10px}
  .row.between{justify-content:space-between;align-items:center}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 10px;text-align:center;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--volt)}
  .stat .num{font-family:'Bebas Neue',sans-serif;font-size:34px;line-height:1;color:var(--volt)}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
  .muted{color:var(--muted)} .small{font-size:14px} .xs{font-size:12px}
  button{font-family:'Rajdhani',sans-serif;cursor:pointer;border:none;border-radius:13px;font-size:16px;font-weight:600}
  .btn{background:var(--volt);color:#0b0c0f;font-weight:700;padding:14px 16px;width:100%;border-radius:14px;text-transform:uppercase;letter-spacing:1px;transition:.12s;display:flex;align-items:center;justify-content:center;gap:9px}
  .btn:active{transform:scale(.98)}
  .btn.sec{background:var(--surface2);color:var(--txt);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);text-transform:none;letter-spacing:.5px}
  .btn.danger{background:transparent;color:var(--coral);border:1px solid #4a2a23;text-transform:none}
  .btn.mini{width:auto;padding:9px 13px;font-size:13px}
  .btn .ic svg{width:18px;height:18px}
  input,select,textarea{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;background:#0e1014;color:var(--txt);border:1px solid var(--line);border-radius:12px;padding:12px;width:100%;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--volt)}
  textarea{resize:vertical;min-height:66px}
  label.fld{display:block;font-size:12px;color:var(--muted);margin:0 0 5px 3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:999px;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--line);color:var(--muted);cursor:pointer;user-select:none}
  .pill.on{background:rgba(202,255,0,.16);border-color:var(--volt);color:var(--volt)}
  .pill.amber.on{background:rgba(255,176,32,.16);border-color:var(--amber);color:var(--amber)}
  .pill.red.on{background:rgba(255,90,54,.16);border-color:var(--coral);color:var(--coral)}
  .pill.blue.on{background:rgba(61,165,255,.16);border-color:var(--blue);color:var(--blue)}
  .pill.pink.on{background:rgba(255,77,141,.16);border-color:var(--pink);color:var(--pink)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
  .badge.up{background:rgba(202,255,0,.16);color:var(--volt)}
  .badge.hold{background:rgba(61,165,255,.16);color:var(--blue)}
  .badge.new{background:rgba(255,176,32,.16);color:var(--amber)}
  .ex{border-top:1px solid var(--line);padding:12px 0}
  .ex:first-of-type{border-top:none}
  .ex .name{font-weight:700;font-size:16px}
  .ex .meta{font-size:13px;color:var(--muted);margin-top:2px}
  .daytab{padding:10px 13px;border-radius:12px;font-size:13px;font-weight:700;background:var(--surface2);border:1px solid var(--line);color:var(--muted);white-space:nowrap;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
  .daytab.on{background:var(--volt);border-color:var(--volt);color:#0b0c0f}
  .scrollx{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .scrollx::-webkit-scrollbar{display:none}
  nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(11,12,15,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  nav.tabs button{flex:1;background:none;border:none;color:var(--muted);padding:10px 0 12px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  nav.tabs button.on{color:var(--volt)}
  nav.tabs svg{width:24px;height:24px}
  .view{display:none;animation:fade .22s}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .empty{color:var(--muted);text-align:center;padding:26px 12px;font-size:15px}
  .note{background:#0e1014;border:1px solid var(--line);border-left:3px solid var(--volt);border-radius:12px;padding:12px 13px;font-size:14px;color:var(--muted)}
  .hero{background:linear-gradient(120deg,#1a1d25,#121419);border:1px solid var(--line);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;margin-bottom:12px}
  .hero::after{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;background:radial-gradient(circle,rgba(202,255,0,.14),transparent 70%)}
  .hero .ic{color:var(--volt);opacity:.9}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .modal-bg.on{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:22px 22px 0 0;width:100%;max-width:580px;padding:20px 16px 28px;max-height:90vh;overflow:auto}
  .modal h3{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1.5px;margin:2px 0 14px}
  .tag-chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--surface2);color:var(--muted);margin:0 5px 5px 0;text-transform:uppercase;letter-spacing:.5px}
  .spark{width:100%;display:block}
  .num-grp{display:flex;gap:8px;flex-wrap:wrap}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .photo-grid img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
  .photo-cell{position:relative}
  .photo-cell .cap{position:absolute;left:6px;bottom:6px;background:rgba(0,0,0,.6);padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
  .cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .cmp .lab{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:15px;color:var(--volt);margin-bottom:5px;text-align:center}
  .cmp img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
  a.link{color:var(--volt);text-decoration:none}
  .swatch-up{color:var(--volt)} .swatch-hold{color:var(--blue)}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="brand" onclick="editName()" style="cursor:pointer">
      <div class="logo" id="logoIcon"></div>
      <div>
        <div style="display:flex;align-items:center;gap:6px"><h1 id="brandName">FORJA</h1><span class="ic" id="nameEdit" style="opacity:.45"></span></div>
        <div class="sub" id="brandSub">Training</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="lang">
        <button id="langEs" onclick="setLang('es')">ES</button>
        <button id="langDe" onclick="setLang('de')">DE</button>
      </div>
      <button class="btn mini sec" style="padding:9px 11px" onclick="openMenu()"><span class="ic" id="gearIc"></span></button>
    </div>
  </header>

  <!-- ===== INICIO ===== -->
  <section class="view on" id="v-inicio">
    <div class="hero">
      <div class="row between">
        <div>
          <div class="display" style="font-size:30px;line-height:1" id="heroHi"></div>
          <div class="muted small" id="todayLabel"></div>
        </div>
        <span class="ic" id="heroIcon"></span>
      </div>
    </div>
    <div class="grid3">
      <div class="stat"><div class="num" id="stWeek">0</div><div class="lbl" data-i18n="st_week"></div></div>
      <div class="stat"><div class="num" id="stStreak">0</div><div class="lbl" data-i18n="st_streak"></div></div>
      <div class="stat"><div class="num" id="stTotal">0</div><div class="lbl" data-i18n="st_total"></div></div>
    </div>
    <div class="card"><div class="small" id="motiv"></div></div>

    <h2 class="sec"><span class="ic" id="icToday"></span><span data-i18n="today"></span></h2>
    <div class="card">
      <div class="row between">
        <div><div class="muted xs" data-i18n="suggested_day"></div>
          <div class="display" style="font-size:22px" id="suggestDay">—</div></div>
        <button class="btn mini" onclick="startSuggested()"><span class="ic" id="icPlay"></span><span data-i18n="btn_train"></span></button>
      </div>
    </div>
    <div class="grid2">
      <button class="btn sec" onclick="go('progreso');setTimeout(()=>document.getElementById('wKg').focus(),200)"><span class="ic" id="icScale"></span><span data-i18n="btn_log_weight"></span></button>
      <button class="btn sec" onclick="openJournal()"><span class="ic" id="icPen"></span><span data-i18n="btn_quick_note"></span></button>
    </div>

    <h2 class="sec"><span class="ic" id="icBook2"></span><span data-i18n="recent_notes"></span></h2>
    <div id="recentNotes"></div>
  </section>

  <!-- ===== RUTINA ===== -->
  <section class="view" id="v-rutina">
    <div class="note" style="margin-bottom:12px"><b style="color:var(--txt)" data-i18n="phase_label"></b>: <span id="phaseText"></span></div>
    <div class="scrollx" id="dayTabs" style="margin-bottom:12px"></div>
    <div id="routineBody"></div>
    <button class="btn sec" style="margin-top:4px" onclick="openExerciseForm(null)"><span class="ic" id="icPlus"></span><span data-i18n="add_exercise"></span></button>
    <button class="btn ghost" style="margin-top:10px" onclick="editDayName()" data-i18n="rename_day"></button>
    <button class="btn danger" style="margin-top:18px" onclick="resetRoutine()" data-i18n="reset_routine"></button>
  </section>

  <!-- ===== ENTRENAR ===== -->
  <section class="view" id="v-entrenar">
    <div class="card tight">
      <label class="fld" data-i18n="which_day"></label>
      <select id="trainDaySel" onchange="renderTrain()"></select>
    </div>
    <div id="trainBody"></div>
    <button class="btn" id="saveTrainBtn" style="margin-top:6px;display:none" onclick="saveWorkout()"><span class="ic" id="icCheck"></span><span data-i18n="save_workout"></span></button>
  </section>

  <!-- ===== DIARIO ===== -->
  <section class="view" id="v-diario">
    <button class="btn" onclick="openJournal()"><span class="ic" id="icPlus2"></span><span data-i18n="new_note"></span></button>
    <div id="journalStats"></div>
    <h2 class="sec"><span class="ic" id="icBook"></span><span data-i18n="your_journal"></span></h2>
    <div id="journalList"></div>
  </section>

  <!-- ===== PROGRESO ===== -->
  <section class="view" id="v-progreso">
    <h2 class="sec"><span class="ic" id="icScale2"></span><span data-i18n="your_weight"></span></h2>
    <div class="card">
      <label class="fld" data-i18n="weight_today"></label>
      <div class="row">
        <input type="number" inputmode="decimal" step="0.1" id="wKg" placeholder="68.5">
        <button class="btn mini" style="flex:none;padding:12px 18px" onclick="addWeight()" data-i18n="save"></button>
      </div>
      <input type="date" id="wDate" style="margin-top:10px">
    </div>
    <div class="grid3">
      <div class="stat"><div class="num" id="wStart">—</div><div class="lbl" data-i18n="initial"></div></div>
      <div class="stat"><div class="num" id="wNow">—</div><div class="lbl" data-i18n="now"></div></div>
      <div class="stat"><div class="num" id="wDiff">—</div><div class="lbl" data-i18n="diff"></div></div>
    </div>
    <div class="card"><svg class="spark" id="sparkBig" viewBox="0 0 320 160" preserveAspectRatio="none" style="height:160px"></svg></div>
    <div id="weightList"></div>

    <h2 class="sec"><span class="ic" id="icCam"></span><span data-i18n="ba_title"></span></h2>
    <div id="photoReminder"></div>
    <button class="btn" onclick="triggerPhoto()"><span class="ic" id="icCam2"></span><span data-i18n="add_photo"></span></button>
    <input type="file" id="photoFile" accept="image/*" capture="environment" style="display:none" onchange="onPhotoSelected(event)">
    <div id="compareBox"></div>
    <div id="photoGallery" style="margin-top:12px"></div>
  </section>
</div>

<!-- ===== NAV ===== -->
<nav class="tabs" id="navBar"></nav>

<!-- ===== MODAL ===== -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBox"></div></div>

<script>
"use strict";

/* =========================================================
   ICONOS SVG (sin emojis)
========================================================= */
const ICONS={
  dumbbell:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6.5 6.5l11 11"/><rect x="2.5" y="7" width="4" height="10" rx="1" transform="rotate(-45 4.5 12)"/><rect x="17.5" y="7" width="4" height="10" rx="1" transform="rotate(-45 19.5 12)"/></svg>',
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
  clipboard:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3h6v1"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>',
  book:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h12a2 2 0 0 1 2 2v14l-3-2-3 2-3-2-3 2V6a2 2 0 0 1 2-2z"/></svg>',
  chart:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-8"/><path d="M16 8h5v5"/></svg>',
  flame:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3c1 3 4 4.5 4 8a4 4 0 0 1-8 0c0-1.5.5-2.5 1-3 .3 1 1 1.5 1.5 1.5C10 7.5 11 5 12 3z"/></svg>',
  camera:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L19 6h0a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3.5"/></svg>',
  scale:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M9 9a3 3 0 0 1 6 0"/><path d="M12 9v4"/></svg>',
  play:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
  pen:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4l6 6"/><path d="M4 20l4-1L19 8l-3-3L5 16z"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5h6v2M6 7l1 13h10l1-13"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>',
  gear:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1L16.5 2h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5c.1-.3.1-.7.1-1z"/></svg>',
  download:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11M7 11l5 5 5-5M5 20h14"/></svg>',
  upload:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V9M7 13l5-5 5 5M5 4h14"/></svg>',
  help:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.5 2.3c-.8.4-1 .9-1 1.7"/><path d="M12 17h.01"/></svg>',
  edit:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4l6 6"/><path d="M4 20l4-1L19 8l-3-3L5 16z"/></svg>'
};

  return s;
}

/* =========================================================
   UTILIDADES
========================================================= */
function uid(){ return Math.random().toString(36).slice(2,9); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ const d=new Date(iso+"T00:00:00"); return d.toLocaleDateString(DB.lang==='de'?'de-DE':'es-AR',{weekday:"short",day:"numeric",month:"short"}); }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function startOfWeek(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); d.setHours(0,0,0,0); return d; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function dn(o){ return (DB.lang==='de'&&o.nameDe)?o.nameDe:o.name; }
function dnote(o){ return (DB.lang==='de'&&o.noteDe)?o.noteDe:(o.note||""); }
function timeWord(n){ return n===1?t('time_once'):t('time_many'); }

function applyStatic(){
  document.documentElement.lang=DB.lang;
  document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=t(e.dataset.i18n));
  document.getElementById('brandSub').textContent=t('brand_sub');
  document.getElementById('langEs').classList.toggle('on',DB.lang==='es');
  document.getElementById('langDe').classList.toggle('on',DB.lang==='de');
  // íconos fijos
  document.getElementById('logoIcon').innerHTML=ICONS.dumbbell;
  document.getElementById('gearIc').innerHTML=ICONS.gear;
  document.getElementById('nameEdit').innerHTML=ICONS.pen;
  document.getElementById('heroIcon').innerHTML=ICONS.flame;
  const nm=(DB.name||"").trim();
  document.getElementById('brandName').textContent=nm?nm.toUpperCase():"FORJA";
  document.getElementById('heroHi').textContent=nm?t('hero_hello',{n:nm.split(' ')[0]}):t('hero_hi');
  setIc('icToday','flame');setIc('icPlay','play');setIc('icScale','scale');setIc('icPen','pen');
  setIc('icBook2','book');setIc('icPlus','plus');setIc('icCheck','check');setIc('icPlus2','plus');
  setIc('icBook','book');setIc('icScale2','scale');setIc('icCam','camera');setIc('icCam2','camera');
  buildNav();
}
function setIc(id,name){ const el=document.getElementById(id); if(el) el.innerHTML=ICONS[name]; }
function setLang(l){ DB.lang=l; save(); applyStatic(); go(currentView); }
function editName(){ showModal(`<h3>${t('your_name')}</h3><input id="nm" value="${esc(DB.name||'')}" placeholder="${esc(t('name_ph'))}" maxlength="24"><button class="btn" style="margin-top:14px" onclick="saveName()">${t('save')}</button><button class="btn ghost" style="margin-top:8px" onclick="closeModal()">${t('cancel')}</button>`); setTimeout(()=>{const i=document.getElementById('nm'); if(i)i.focus();},150); }
function saveName(){ DB.name=(document.getElementById('nm').value||'').trim(); save(); applyStatic(); closeModal(); }

function buildNav(){
  const items=[["inicio","home","nav_home"],["rutina","clipboard","nav_routine"],["entrenar","dumbbell","nav_train"],["diario","book","nav_journal"],["progreso","chart","nav_progress"]];
  document.getElementById('navBar').innerHTML=items.map(([v,i,k])=>
    `<button class="${v===currentView?'on':''}" data-v="${v}" onclick="go('${v}')">${ICONS[i]}<span>${t(k)}</span></button>`).join("");
}

/* =========================================================
   NAVEGACIÓN
========================================================= */
function go(v){
  currentView=v;
  document.querySelectorAll(".view").forEach(s=>s.classList.remove("on"));
  document.getElementById("v-"+v).classList.add("on");
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.v===v));
  window.scrollTo(0,0);
  if(v==="inicio")renderInicio();
  if(v==="rutina")renderRutina();
  if(v==="entrenar")renderTrainSelect();
  if(v==="diario")renderJournal();
  if(v==="progreso")renderProgreso();
}

function weeksSinceStart(){ return Math.floor(daysBetween(DB.startDate,today())/7); }
function phaseInfo(){ const w=weeksSinceStart(); if(w<3)return{n:1,text:t('phase1')}; if(w<8)return{n:2,text:t('phase2')}; return{n:3,text:t('phase3')}; }
function lastForExercise(name){ for(let i=DB.logs.length-1;i>=0;i--){ const f=DB.logs[i].exercises.find(x=>x.name===name); if(f&&f.weight>0)return f; } return null; }
function suggestion(ex){
  const last=lastForExercise(ex.name);
  if(!last) return {type:"new",txt:t('sug_new'),prefWeight:""};
  if(last.top && last.reps>=ex.rMax) return {type:"up",txt:t('sug_up',{r:last.reps,w:last.weight}),prefWeight:last.weight};
  return {type:"hold",txt:t('sug_hold',{w:last.weight,r:last.reps}),prefWeight:last.weight};
}

function streak(){ if(!DB.logs.length)return 0; const sow=new Date();sow.setDate(sow.getDate()-6); return [...new Set(DB.logs.map(l=>l.date))].filter(d=>new Date(d+"T00:00:00")>=sow).length; }
function nextDayIdx(){ if(!DB.logs.length)return 0; const last=DB.logs[DB.logs.length-1].dayName; const idx=DB.routine.findIndex(d=>d.name===last||d.nameDe===last); return idx<0?0:(idx+1)%DB.routine.length; }

function journalCard(j){

  }).join("");

function delJournal(i){ if(confirm(t('confirm_del_note'))){ DB.journal.splice(i,1); save(); renderJournal(); } }
function renderStats(){
  const box=document.getElementById("journalStats"); const J=DB.journal||[];
  if(J.length<3){ box.innerHTML=`<div class="note" style="margin:12px 0">${ICONS.chart} ${t('stats_wait')}</div>`; return; }
  const count={}; J.forEach(j=>(j.tags||[]).forEach(k=>count[k]=(count[k]||0)+1));
  const trained=count["trained"]||0, notTrained=count["no_train"]||0, totalDays=trained+notTrained;
  const pct=totalDays?Math.round(trained/totalDays*100):0;
  const reasons={}; J.forEach(j=>{const tg=j.tags||[]; if(tg.includes("no_train"))tg.forEach(k=>{if(!ATTEND.has(k))reasons[k]=(reasons[k]||0)+1;});});
  const topReason=Object.entries(reasons).sort((a,b)=>b[1]-a[1])[0];
  let cycleSkips=0; J.forEach(j=>{const tg=j.tags||[]; if(tg.includes("no_train")&&tg.some(k=>CYCLE.has(k)))cycleSkips++;});
  const top=Object.entries(count).filter(([k])=>!ATTEND.has(k)).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxv=top.length?top[0][1]:1;
  const bars=top.length?top.map(([k,v])=>`<div style="margin:8px 0"><div class="row between xs"><span>${esc(tag(k))}</span><span class="muted">${v}</span></div>
    <div style="height:9px;background:#0e1014;border-radius:6px;overflow:hidden;margin-top:3px"><div style="height:100%;width:${Math.round(v/maxv*100)}%;background:${tagColor(k)};border-radius:6px"></div></div></div>`).join(""):"";
  const ins=[];
  if(topReason)ins.push(t('insight_reason',{tag:esc(tag(topReason[0])),n:topReason[1],t:timeWord(topReason[1])}));
  if(cycleSkips>0)ins.push(t('insight_cycle',{n:cycleSkips,t:timeWord(cycleSkips)}));
  if(totalDays>=4)ins.push(t('insight_pct',{p:pct,a:trained,b:totalDays}));
  box.innerHTML=`<h2 class="sec">${ICONS.chart}<span>${t('patterns')}</span></h2>
   <div class="grid2"><div class="stat"><div class="num">${trained}</div><div class="lbl">${t('days_trained')}</div></div>
   <div class="stat"><div class="num" style="color:var(--coral)">${notTrained}</div><div class="lbl">${t('days_not')}</div></div></div>
   <div class="card"><div class="xs muted" style="margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">${t('most_logged')}</div>${bars}</div>
   ${ins.length?`<div class="card"><div class="xs muted" style="margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">${t('observations')}</div>${ins.map(i=>`<div class="small" style="margin:7px 0">${i}</div>`).join("")}</div>`:""}`;
}

function addWeight(){
  const kg=+document.getElementById("wKg").value, date=document.getElementById("wDate").value||today();
  if(!kg||kg<20||kg>400){ alert(t('valid_weight')); return; }
  const ex=DB.weights.find(w=>w.date===date); if(ex)ex.kg=kg; else DB.weights.push({date,kg});
  DB.weights.sort((a,b)=>a.date.localeCompare(b.date)); document.getElementById("wKg").value=""; save(); renderProgreso();
}
function delWeight(i){ if(confirm(t('confirm_del_w'))){ DB.weights.splice(i,1); save(); renderProgreso(); } }
function renderProgreso(){
  const di=document.getElementById("wDate"); if(!di.value)di.value=today();
  const ws=DB.weights;
  if(ws.length){ const s=ws[0].kg,n=ws[ws.length-1].kg,d=n-s;
    document.getElementById("wStart").textContent=s; document.getElementById("wNow").textContent=n;
    const de=document.getElementById("wDiff"); de.textContent=(d>0?"+":"")+d.toFixed(1); de.style.color=d<0?"var(--volt)":d>0?"var(--amber)":"var(--muted)";
  } else { ["wStart","wNow","wDiff"].forEach(id=>document.getElementById(id).textContent="—"); }
  drawSpark("sparkBig",ws);
  const list=document.getElementById("weightList");
  list.innerHTML=!ws.length?`<div class="empty">${t('no_weight')}</div>`:[...ws].reverse().map((w,ri)=>{
    const idx=ws.length-1-ri, prev=idx>0?ws[idx-1].kg:null, d=prev!=null?(w.kg-prev):null;
    const dt=d!=null?`<span class="xs" style="color:${d<0?'var(--volt)':d>0?'var(--amber)':'var(--muted)'}">${d>0?'+':''}${d.toFixed(1)}</span>`:"";
    return `<div class="card tight"><div class="row between"><div><b style="font-size:18px">${w.kg} kg</b> ${dt}</div><div class="row" style="align-items:center;gap:10px"><span class="muted xs">${fmtDate(w.date)}</span><button class="btn mini ghost" onclick="delWeight(${idx})">${ICONS.trash}</button></div></div></div>`;
  }).join("");
  renderPhotos();
}
function drawSpark(id,ws){
  const svg=document.getElementById(id);
  if(!ws||ws.length<2){ svg.innerHTML=`<text x="160" y="80" fill="#5a6473" font-size="12" text-anchor="middle" font-family="Rajdhani">${t('need2')}</text>`; return; }
  const W=320,H=160,pad=16;
  const xs=ws.map(w=>+new Date(w.date)),ys=ws.map(w=>w.kg);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const rx=(maxX-minX)||1,ry=(maxY-minY)||1;
  const px=v=>pad+(v-minX)/rx*(W-2*pad), py=v=>H-pad-(v-minY)/ry*(H-2*pad);
  let d="",pts=""; ws.forEach((w,i)=>{const x=px(+new Date(w.date)),y=py(w.kg); d+=(i?" L":"M")+x.toFixed(1)+" "+y.toFixed(1); pts+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.2" fill="#caff00"/>`;});
  svg.innerHTML=`<defs><linearGradient id="g_${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#caff00" stop-opacity="0.28"/><stop offset="100%" stop-color="#caff00" stop-opacity="0"/></linearGradient></defs>
   <path d="${d} L${px(maxX).toFixed(1)} ${H-pad} L${px(minX).toFixed(1)} ${H-pad} Z" fill="url(#g_${id})"/>
   <path d="${d}" fill="none" stroke="#caff00" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${pts}
   <text x="${pad}" y="13" fill="#5a6473" font-size="11" font-family="Rajdhani">${maxY} kg</text>
   <text x="${pad}" y="${H-4}" fill="#5a6473" font-size="11" font-family="Rajdhani">${minY} kg</text>`;
}

let pendingPhoto=null;
function triggerPhoto(){ document.getElementById("photoFile").click(); }
function onPhotoSelected(ev){
  const file=ev.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=640; let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    pendingPhoto=c.toDataURL("image/jpeg",0.6); ev.target.value=""; photoForm();
  }; img.src=reader.result; };
  reader.readAsDataURL(file);
}
function photoForm(){
  showModal(`<h3>${t('ba_title')}</h3>
   <img src="${pendingPhoto}" style="width:100%;max-height:46vh;object-fit:contain;border-radius:12px;border:1px solid var(--line)">

function delPhoto(id){ if(confirm(t('del_photo'))){ DB.photos=DB.photos.filter(p=>p.id!==id); save(); renderProgreso(); } }
function viewPhoto(id){ const p=DB.photos.find(x=>x.id===id); if(!p)return;

function openMenu(){
  showModal(`<h3>${t('options')}</h3>
   <button class="btn sec" onclick="exportData()">${ICONS.download}<span style="margin-left:8px">${t('backup_dl')}</span></button>
   <button class="btn sec" style="margin-top:8px" onclick="document.getElementById('importFile').click()">${ICONS.upload}<span style="margin-left:8px">${t('backup_up')}</span></button>
   <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
   <button class="btn sec" style="margin-top:8px" onclick="closeModal();showHelp()">${ICONS.help}<span style="margin-left:8px">${t('how_to')}</span></button>
   <button class="btn danger" style="margin-top:16px" onclick="wipe()">${t('delete_all')}</button>
   <button class="btn ghost" style="margin-top:8px" onclick="closeModal()">${t('close')}</button>
   <p class="xs muted" style="margin-top:14px;text-align:center">${t('data_local')}</p>`);
}
function exportData(){ const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="forja-backup-"+today()+".json"; a.click(); }
function importData(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{try{DB=JSON.parse(r.result); if(!DB.lang)DB.lang="es"; if(!DB.photos)DB.photos=[]; save(); applyStatic(); closeModal(); go("inicio"); alert(t('imported'));}catch(e){alert(t('invalid_file'));}}; r.readAsText(f); }
function wipe(){ if(confirm(t('confirm_wipe'))){ DB=seed(); save(); applyStatic(); closeModal(); go("inicio"); } }
function showHelp(){ showModal(`<h3>${t('how_to')}</h3><div class="small" style="line-height:1.6">${t('help_body')}</div><button class="btn" style="margin-top:14px" onclick="closeModal()">${t('got_it')}</button>`); }

/* =========================================================
   INIT
========================================================= */
applyStatic();
go("inicio");
</script>
</body>
</html>
